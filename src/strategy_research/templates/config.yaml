# strategy-research YAML 配置模板
# 复用自 QuantNodes/strategy/momentum_etf_rotation/strategies/

strategy:
  name: {strategy_name}        # 策略名称
  type: {strategy_type}        # rotation/selection/timing/industry

data:
  source: duckdb               # duckdb (统一使用 DuckDB)
  # start_date: 2020-01-01     # 可选: 开始日期
  # end_date: 2025-12-31       # 可选: 结束日期

rebalance:
  freq: M                      # M=月度, W=周度, Q=季度
  min_history: 252             # 预热期 (日频=252, 周频=52)

top_n: 10                      # 选择资产数
max_weight: 0.25               # 最大权重
weight_method: inverse_vol     # inverse_vol/equal

cost:
  enabled: true
  commission_bp: 5             # 佣金 (基点)
  slippage_bp: 10              # 滑点 (基点)
  impact_factor: 0.1           # 冲击成本因子

risk:
  vol_targeting:
    enabled: false
    target_vol: 0.15           # 目标年化波动率
    lookback: 60               # 波动率计算窗口 (天)
    min_scale: 0.3             # 最小缩放比例
    max_scale: 2.0             # 最大缩放比例
  trend_filter:
    enabled: false
    ma_window: 200             # MA 窗口 (天)
    bear_exposure: 0.5         # 熊市暴露比例
  stop_loss:
    enabled: false
    threshold: -0.10           # 回撤阈值 (如 -0.10 = -10%)
    cooldown_weeks: 5          # 冷却期 (周)

strategy_params:
  vol_lookback: 60             # 波动率计算窗口 (逆波动率加权)

# 因子配置
# 支持三种因子类型:
# 1. 表达式因子 (code): 使用算子表达式
# 2. Alpha Zoo 因子 (alpha_id): 使用预置因子库
# 3. 混合因子 (alpha_ids): 多个 Alpha Zoo 因子组合

factors:
  # 方式 1: 表达式因子
  - name: momentum_20d
    code: ts_return(close, 20)
    weight: 0.5
    category: momentum
  - name: vol_20d
    code: ts_std(ts_return(close, 1), 20)
    weight: 0.5
    category: volatility

  # 方式 2: Alpha Zoo 因子 (单个)
  # - name: gtja191_001
  #   alpha_id: gtja191_001
  #   weight: 0.3
  #   category: volume_price

  # 方式 3: Alpha Zoo 因子 (批量组合)
  # - name: momentum_composite
  #   alpha_ids:
  #     - alpha101_001
  #     - gtja191_010
  #     - qlib158_ma10
  #   combination: ic_weighted  # equal / ic_weighted / risk_parity
  #   weight: 0.4

# Alpha Zoo 可用因子库:
# - alpha101: Kakushadze 101 个公式化因子 (主题: momentum/reversal/volatility/volume)
# - gtja191: 国泰君安 191 个 A 股截面因子 (主题: volume/reversal/momentum/volatility)
# - qlib158: 微软 Qlib 158 个 ML 因子 (主题: momentum/volatility/volume)
# - academic: 11 个学术因子 (Fama-French, Carhart 等)
# - fundamental: 4 个基本面因子 (ROE, 盈利收益率等)
#
# 列出可用因子:
#   from strategy_research.core.alpha_zoo_adapter import AlphaZooAdapter
#   adapter = AlphaZooAdapter()
#   alphas = adapter.list_alphas(zoo="gtja191", theme="momentum")
