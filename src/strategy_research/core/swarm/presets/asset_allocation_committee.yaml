name: asset_allocation_committee
description: 资产配置委员会 — 股票/债券/商品三路并行 → 配置策略师综合
agents:
  - id: equity_specialist
    prompt_file: .prompts/researcher.md
    tools: [read_file]
  - id: bond_specialist
    prompt_file: .prompts/factor_analyst.md
    tools: [read_file, factor_analysis]
  - id: commodity_specialist
    prompt_file: .prompts/strategist.md
    tools: [read_file]
  - id: allocator
    prompt_file: .prompts/portfolio_construction.md
    input_from: [equity_specialist, bond_specialist, commodity_specialist]
    tools: [read_file, write_file, run_backtest]
dag:
  equity_specialist: []
  bond_specialist: []
  commodity_specialist: []
  allocator: [equity_specialist, bond_specialist, commodity_specialist]