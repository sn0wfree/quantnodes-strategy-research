id: gtja191_143
zoo: gtja191
nickname: ''
theme:
- momentum
formula_latex: cumprod(1 + (c/delay(c,1)-1) if c>delay(c,1) else 0)
columns_required:
- close
universe:
- equity_cn
frequency:
- 1d
decay_horizon: 1
min_warmup_bars: 2
steps:
- name: c
  expr:
    column: close
- name: dc
  expr:
    op: sub
    args:
    - ref: c
    - op: shift
      args:
      - ref: c
      - value: 1
- name: inc
  expr:
    op: where
    args:
    - op: safe_div
      args:
      - ref: dc
      - op: shift
        args:
        - ref: c
        - value: 1
    - op: gt
      args:
      - ref: dc
      - value: 0
    - value: 0.0
- name: out
  expr:
    op: cumprod
    args:
    - op: add
      args:
      - value: 1.0
      - ref: inc
final:
  ref: out
