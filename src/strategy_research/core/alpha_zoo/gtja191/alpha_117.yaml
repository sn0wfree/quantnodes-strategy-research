min_warmup_bars: 33
steps:
- name: c
  expr:
    column: close
- name: h
  expr:
    column: high
- name: l
  expr:
    column: low
- name: v
  expr:
    column: volume
- name: ret
  expr:
    op: sub
    args:
    - op: safe_div
      args:
      - ref: c
      - op: shift
        args:
        - ref: c
        - value: 1
    - value: 1.0
- name: out
  expr:
    op: mul
    args:
    - op: mul
      args:
      - op: ts_rank
        args:
        - ref: v
        - value: 32
      - op: sub
        args:
        - value: 1.0
        - op: ts_rank
          args:
          - op: sub
            args:
            - op: add
              args:
              - ref: c
              - ref: h
            - ref: l
          - value: 16
    - op: sub
      args:
      - value: 1.0
      - op: ts_rank
        args:
        - ref: ret
        - value: 32
final:
  ref: out
