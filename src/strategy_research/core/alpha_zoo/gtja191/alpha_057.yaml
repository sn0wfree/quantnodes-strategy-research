id: gtja191_057
zoo: gtja191
nickname: ''
theme:
- momentum
formula_latex: SMA((CLOSE-TSMIN(LOW,9))/(TSMAX(HIGH,9)-TSMIN(LOW,9))*100,3,1)
columns_required:
- close
- high
- low
universe:
- equity_cn
frequency:
- 1d
decay_horizon: 9
min_warmup_bars: 10
steps:
- name: c
  expr:
    column: close
- name: h
  expr:
    column: high
- name: l
  expr:
    column: low
- name: lo9
  expr:
    op: ts_min
    args:
    - ref: l
    - value: 9
- name: hi9
  expr:
    op: ts_max
    args:
    - ref: h
    - value: 9
- name: raw
  expr:
    op: mul
    args:
    - op: safe_div
      args:
      - op: sub
        args:
        - ref: c
        - ref: lo9
      - op: sub
        args:
        - ref: hi9
        - ref: lo9
    - value: 100.0
final:
  op: ewm_mean
  args:
  - ref: raw
  - value: 20
