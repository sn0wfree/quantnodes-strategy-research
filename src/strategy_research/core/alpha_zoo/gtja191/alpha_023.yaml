id: gtja191_023
zoo: gtja191
nickname: ''
theme:
- volatility
formula_latex: SMA((CLOSE>DELAY(CLOSE,1)?STD(CLOSE,20):0),20,1)/(SMA((CLOSE>DELAY(CLOSE,1)?STD(CLOSE,20):0),20,1) + SMA((CLOSE<=DELAY(CLOSE,1)?STD(CLOSE,20):0),20,1))
  * 100
columns_required:
- close
universe:
- equity_cn
frequency:
- 1d
decay_horizon: 20
min_warmup_bars: 22
steps:
- name: c
  expr:
    column: close
- name: pc
  expr:
    op: delay
    args:
    - ref: c
    - value: 1
- name: s20
  expr:
    op: ts_std
    args:
    - ref: c
    - value: 20
- name: up
  expr:
    op: gt
    args:
    - ref: c
    - ref: pc
- name: up_part
  expr:
    ref: s20
- name: dn_part
  expr:
    ref: s20
- name: u_sma
  expr:
    op: mean
    args:
    - _type: ewm
      obj:
        _type: ref
        name: up_part
      span:
        value: 20
- name: d_sma
  expr:
    op: mean
    args:
    - _type: ewm
      obj:
        _type: ref
        name: dn_part
      span:
        value: 20
final:
  op: mul
  args:
  - op: safe_div
    args:
    - ref: u_sma
    - op: add
      args:
      - ref: u_sma
      - ref: d_sma
  - value: 100.0
