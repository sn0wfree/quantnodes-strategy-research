id: gtja191_111
zoo: gtja191
nickname: ''
theme:
- volume
- microstructure
formula_latex: sma(v*((c-l)-(h-c))/(h-l),11,2)-sma(v*((c-l)-(h-c))/(h-l),4,2)
columns_required:
- open
- high
- low
- close
- volume
universe:
- equity_cn
frequency:
- 1d
decay_horizon: 11
min_warmup_bars: 12
steps:
- name: c
  expr:
    column: close
- name: h
  expr:
    column: high
- name: l
  expr:
    column: low
- name: v
  expr:
    column: volume
- name: ratio
  expr:
    op: safe_div
    args:
    - op: mul
      args:
      - ref: v
      - op: sub
        args:
        - op: sub
          args:
          - ref: c
          - ref: l
        - op: sub
          args:
          - ref: h
          - ref: c
    - op: sub
      args:
      - ref: h
      - ref: l
- name: out
  expr:
    op: sub
    args:
    - op: ts_mean
      args:
      - ref: ratio
      - value: 11
      - value: 2
    - op: ts_mean
      args:
      - ref: ratio
      - value: 4
      - value: 2
final:
  ref: out
