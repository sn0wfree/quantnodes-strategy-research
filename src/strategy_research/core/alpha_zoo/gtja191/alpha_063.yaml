id: gtja191_063
zoo: gtja191
nickname: ''
theme:
- momentum
formula_latex: SMA(MAX(CLOSE-DELAY(CLOSE,1),0),6,1)/SMA(ABS(CLOSE-DELAY(CLOSE,1)),6,1)*100
columns_required:
- close
universe:
- equity_cn
frequency:
- 1d
