id: gtja191_108
zoo: gtja191
nickname: ''
theme:
- reversal
- volume
formula_latex: (rank(high-min(high,2))^rank(corr(vwap,mean(volume,120),6)))*-1
columns_required:
- open
- high
- low
- close
- volume
- amount
universe:
- equity_cn
frequency:
- 1d
decay_horizon: 6
min_warmup_bars: 125
steps:
- name: h
  expr:
    column: high
- name: v
  expr:
    column: volume
- name: vw
  expr:
    op: safe_div
    args:
    - column: amount
    - column: volume
- name: left
  expr:
    op: rank
    args:
    - op: sub
      args:
      - ref: h
      - op: ts_min
        args:
        - ref: h
        - value: 2
- name: right
  expr:
    op: rank
    args:
    - op: ts_corr
      args:
      - ref: vw
      - op: ts_mean
        args:
        - ref: v
        - value: 120
      - value: 6
- name: out
  expr:
    op: mul
    args:
    - op: signed_power
      args:
      - ref: left
      - value: 1.0
    - value: 0
- name: arr_l
  expr:
    op: to_numpy
    args:
    - ref: left
- name: arr_r
  expr:
    op: to_numpy
    args:
    - ref: right
- name: arr
  expr:
    op: power
    args:
    - ref: arr_l
    - ref: arr_r
- name: out_2
  expr:
    op: mul
    args:
    - op: to_df
      args:
      - ref: arr
    - op: neg
      args:
      - value: 1.0
final:
  ref: out
