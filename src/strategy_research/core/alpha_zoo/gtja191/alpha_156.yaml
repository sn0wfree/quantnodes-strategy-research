steps:
- name: o
  expr:
    column: open
- name: l
  expr:
    column: low
- name: vw
  expr:
    op: vwap
    args:
    - ref: panel
    - value: equity_cn
- name: a
  expr:
    op: rank
    args:
    - op: decay_linear
      args:
      - op: delta
        args:
        - ref: vw
        - value: 5
      - value: 3
- name: mix
  expr:
    op: add
    args:
    - op: mul
      args:
      - ref: o
      - value: 0.15
    - op: mul
      args:
      - ref: l
      - value: 0.85
- name: b_inner
  expr:
    op: mul
    args:
    - op: neg
      args:
      - value: 1.0
    - op: safe_div
      args:
      - op: delta
        args:
        - ref: mix
        - value: 2
      - ref: mix
- name: b
  expr:
    op: rank
    args:
    - op: decay_linear
      args:
      - ref: b_inner
      - value: 3
- name: arr
  expr:
    op: maximum
    args:
    - op: to_numpy
      args:
      - ref: a
    - op: to_numpy
      args:
      - ref: b
- name: out
  expr:
    op: mul
    args:
    - op: DataFrame
      args:
      - ref: pd
      - ref: arr
    - op: neg
      args:
      - value: 1.0
