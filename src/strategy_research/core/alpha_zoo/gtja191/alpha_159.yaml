- name: lo_hi_diff
  expr:
    op: sub
    args:
    - ref: hi
    - ref: lo
- name: t6_num
  expr:
    op: sub
    args:
    - ref: c
    - op: ts_sum
      args:
      - ref: lo
      - value: 6
- name: t6_den
  expr:
    op: ts_sum
    args:
    - ref: lo_hi_diff
    - value: 6
- name: t6
  expr:
    op: safe_div
    args:
    - ref: t6_num
    - ref: t6_den
- name: t12_num
  expr:
    op: sub
    args:
    - ref: c
    - op: ts_sum
      args:
      - ref: lo
      - value: 12
- name: t12_den
  expr:
    op: ts_sum
    args:
    - ref: lo_hi_diff
    - value: 12
- name: t12
  expr:
    op: safe_div
    args:
    - ref: t12_num
    - ref: t12_den
- name: t24_num
  expr:
    op: sub
    args:
    - ref: c
    - op: ts_sum
      args:
      - ref: lo
      - value: 24
- name: t24_den
  expr:
    op: ts_sum
    args:
    - ref: lo_hi_diff
    - value: 24
- name: t24
  expr:
    op: safe_div
    args:
    - ref: t24_num
    - ref: t24_den
- name: t6_part
  expr:
    op: mul
    args:
    - op: mul
      args:
      - ref: t6
      - value: 12.0
    - value: 24.0
- name: t12_part
  expr:
    op: mul
    args:
    - op: mul
      args:
      - ref: t12
      - value: 6.0
    - value: 24.0
- name: t24_part
  expr:
    op: mul
    args:
    - op: mul
      args:
      - ref: t24
      - value: 6.0
    - value: 12.0
- name: numerator
  expr:
    op: add
    args:
    - op: add
      args:
      - ref: t6_part
      - ref: t12_part
    - ref: t24_part
- name: denominator
  expr:
    op: add
    args:
    - op: add
      args:
      - op: mul
        args:
        - value: 6.0
        - value: 12.0
      - op: mul
        args:
        - value: 6.0
        - value: 24.0
    - op: mul
      args:
      - value: 12.0
      - value: 24.0
- name: out
  expr:
    op: mul
    args:
    - op: div
      args:
      - ref: numerator
      - ref: denominator
    - value: 100.0
final:
  ref: out
