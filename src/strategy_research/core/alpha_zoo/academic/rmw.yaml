id: academic_rmw
zoo: academic
nickname: '[PRICE PROXY] FF2015 RMW — quality via inverse 60d volatility'
theme:
- quality
formula_latex: \mathrm{zscore}_{x}\bigl(-\mathrm{ts\_std}((\mathrm{close}_t - \mathrm{close}_{t-1}) / \mathrm{close}_{t-1},\,60)\bigr)
columns_required:
- close
universe:
- equity_us
- equity_cn
- equity_hk
frequency:
- 1d
decay_horizon: 60
min_warmup_bars: 60
steps:
- name: close
  expr:
    column: close
- name: ret_1d
  expr:
    op: safe_div
    args:
    - op: delta
      args:
      - ref: close
      - value: 1
    - op: shift
      args:
      - ref: close
      - value: 1
- name: vol_60
  expr:
    op: ts_std
    args:
    - ref: ret_1d
    - value: 60
final:
  op: zscore
  args:
  - op: neg
    args:
    - ref: vol_60
