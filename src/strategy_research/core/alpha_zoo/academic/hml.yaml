id: academic_hml
zoo: academic
nickname: '[PRICE PROXY] FF1993 HML — value via inverse 252d return'
theme:
- value
formula_latex: \mathrm{zscore}_{x}\bigl(-(\mathrm{close}_t - \mathrm{close}_{t-252}) / \mathrm{close}_{t-252}\bigr)
columns_required:
- close
universe:
- equity_us
- equity_cn
- equity_hk
frequency:
- 1d
decay_horizon: 60
min_warmup_bars: 252
steps:
- name: close
  expr:
    column: close
- name: ret
  expr:
    op: safe_div
    args:
    - op: delta
      args:
      - ref: close
      - value: 252
    - op: shift
      args:
      - ref: close
      - value: 252
final:
  op: zscore
  args:
  - op: neg
    args:
    - ref: ret
