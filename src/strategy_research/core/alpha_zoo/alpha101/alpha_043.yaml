id: alpha101_043
zoo: alpha101
nickname: 'Kakushadze Alpha #43'
theme:
- volume
- momentum
formula_latex: ts_rank(volume/adv20,20) * ts_rank(-1*delta(close,7),8)
columns_required:
- close
- volume
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 39
steps:
- name: close
  expr:
    column: close
- name: volume
  expr:
    column: volume
- name: adv20
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 20
- name: out
  expr:
    op: mul
    args:
    - op: ts_rank
      args:
      - op: safe_div
        args:
        - ref: volume
        - ref: adv20
      - value: 20
    - op: ts_rank
      args:
      - op: mul
        args:
        - op: neg
          args:
          - value: 1.0
        - op: delta
          args:
          - ref: close
          - value: 7
      - value: 8
final:
  ref: out
