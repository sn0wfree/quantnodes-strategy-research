id: alpha101_101
zoo: alpha101
nickname: 'Kakushadze Alpha #101'
theme:
- reversal
formula_latex: (close - open) / ((high - low) + 0.001)
columns_required:
- open
- high
- low
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 1
steps:
- name: close
  expr:
    column: close
- name: open_
  expr:
    column: open
- name: high
  expr:
    column: high
- name: low
  expr:
    column: low
- name: out
  expr:
    op: safe_div
    args:
    - op: sub
      args:
      - ref: close
      - ref: open_
    - op: add
      args:
      - op: sub
        args:
        - ref: high
        - ref: low
      - value: 0.001
final:
  ref: out
