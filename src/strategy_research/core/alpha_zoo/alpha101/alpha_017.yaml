id: alpha101_017
zoo: alpha101
nickname: 'Kakushadze Alpha #17'
theme:
- volume
- reversal
formula_latex: ((-1*rank(ts_rank(close,10)))*rank(delta(delta(close,1),1)))*rank(ts_rank(volume/adv20,5))
columns_required:
- close
- volume
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 25
steps:
- name: close
  expr:
    column: close
- name: volume
  expr:
    column: volume
- name: adv20
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 20
- name: out
  expr:
    op: mul
    args:
    - op: mul
      args:
      - op: mul
        args:
        - op: neg
          args:
          - value: 1.0
        - op: rank
          args:
          - op: ts_rank
            args:
            - ref: close
            - value: 10
      - op: rank
        args:
        - op: delta
          args:
          - op: delta
            args:
            - ref: close
            - value: 1
          - value: 1
    - op: rank
      args:
      - op: ts_rank
        args:
        - op: safe_div
          args:
          - ref: volume
          - ref: adv20
        - value: 5
final:
  ref: out
