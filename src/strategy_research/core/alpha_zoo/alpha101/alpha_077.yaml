id: alpha101_077
zoo: alpha101
nickname: 'Kakushadze Alpha #77'
theme:
- volume
formula_latex: min(rank(decay_linear((high+low)/2 + high - (vwap+high), 20)), rank(decay_linear(correlation((high+low)/2,
  adv40, 3), 6)))
columns_required:
- high
- low
- volume
- vwap
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 47
steps:
- name: close
  expr:
    column: close
- name: high
  expr:
    column: high
- name: low
  expr:
    column: low
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: adv40
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 40
- name: a
  expr:
    op: rank
    args:
    - op: decay_linear
      args:
      - op: sub
        args:
        - op: add
          args:
          - op: div
            args:
            - op: add
              args:
              - ref: high
              - ref: low
            - value: 2.0
          - ref: high
        - op: add
          args:
          - ref: vwap
          - ref: high
      - value: 20
- name: b
  expr:
    op: rank
    args:
    - op: decay_linear
      args:
      - op: ts_corr
        args:
        - op: div
          args:
          - op: add
            args:
            - ref: high
            - ref: low
          - value: 2.0
        - ref: adv40
        - value: 3
      - value: 6
- name: arr_a
  expr:
    op: to_numpy
    args:
    - ref: a
- name: arr_b
  expr:
    op: to_numpy
    args:
    - ref: b
- name: out
  expr:
    op: to_df
    args:
    - op: fmin
      args:
      - ref: arr_a
      - ref: arr_b
final:
  ref: out
