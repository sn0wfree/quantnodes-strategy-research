id: alpha101_029
zoo: alpha101
nickname: 'Kakushadze Alpha #29'
theme:
- reversal
- volume
formula_latex: min(product(rank(rank(scale(log(sum(ts_min(rank(rank(-1*rank(delta(close-1,5)))),2),1))))),1),5) + ts_rank(delay(-1*returns,6),5)
columns_required:
- close
- volume
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 12
steps:
- name: close
  expr:
    column: close
- name: returns
  expr:
    op: pct_change
    args:
    - ref: close
- name: inner
  expr:
    op: rank
    args:
    - op: rank
      args:
      - op: mul
        args:
        - op: neg
          args:
          - value: 1.0
        - op: rank
          args:
          - op: delta
            args:
            - op: sub
              args:
              - ref: close
              - value: 1.0
            - value: 5
- name: inner_2
  expr:
    op: ts_min
    args:
    - ref: inner
    - value: 2
- name: inner_3
  expr:
    op: ts_sum
    args:
    - ref: inner_2
    - value: 1
- name: inner_4
  expr:
    op: log
    args:
    - op: where
      args:
      - ref: inner_3
      - op: gt
        args:
        - ref: inner_3
        - value: 0
- name: inner_5
  expr:
    op: scale
    args:
    - ref: inner_4
- name: inner_6
  expr:
    op: rank
    args:
    - op: rank
      args:
      - ref: inner_5
- name: inner_7
  expr:
    op: ts_prod
    args:
    - ref: inner_6
    - value: 1
- name: term1
  expr:
    op: ts_min
    args:
    - ref: inner
    - value: 5
- name: term2
  expr:
    op: ts_rank
    args:
    - op: delay
      args:
      - op: mul
        args:
        - op: neg
          args:
          - value: 1.0
        - ref: returns
      - value: 6
    - value: 5
- name: out
  expr:
    op: add
    args:
    - ref: term1
    - ref: term2
final:
  ref: out
