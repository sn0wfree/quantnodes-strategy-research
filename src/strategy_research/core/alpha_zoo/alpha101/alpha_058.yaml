id: alpha101_058
zoo: alpha101
nickname: 'Kakushadze Alpha #58'
theme:
- volume
formula_latex: -1 * Ts_Rank(decay_linear(correlation(IndNeutralize(vwap, sector), volume, 4), 8), 6)
columns_required:
- volume
- vwap
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 25
steps:
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: ind_neutralize
  expr:
    ref: _ind_neutralize
- name: out
  expr:
    op: mul
    args:
    - op: neg
      args:
      - value: 1.0
    - op: ts_rank
      args:
      - op: decay_linear
        args:
        - op: ts_corr
          args:
          - op: ind_neutralize
            args:
            - ref: vwap
            - ref: panel
          - ref: volume
          - value: 4
        - value: 8
      - value: 6
final:
  ref: out
