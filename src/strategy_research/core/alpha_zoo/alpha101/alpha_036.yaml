id: alpha101_036
zoo: alpha101
nickname: 'Kakushadze Alpha #36'
theme:
- momentum
- volume
formula_latex: weighted sum; see paper
columns_required:
- open
- close
- volume
- vwap
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 200
steps:
- name: close
  expr:
    column: close
- name: open_
  expr:
    column: open
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: adv20
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 20
- name: returns
  expr:
    op: pct_change
    args:
    - ref: close
- name: t1
  expr:
    op: mul
    args:
    - value: 2.21
    - op: rank
      args:
      - op: ts_corr
        args:
        - op: sub
          args:
          - ref: close
          - ref: open_
        - op: delay
          args:
          - ref: volume
          - value: 1
        - value: 15
- name: t2
  expr:
    op: mul
    args:
    - value: 0.7
    - op: rank
      args:
      - op: sub
        args:
        - ref: open_
        - ref: close
- name: t3
  expr:
    op: mul
    args:
    - value: 0.73
    - op: rank
      args:
      - op: ts_rank
        args:
        - op: delay
          args:
          - op: mul
            args:
            - op: neg
              args:
              - value: 1.0
            - ref: returns
          - value: 6
        - value: 5
- name: t4
  expr:
    op: rank
    args:
    - op: abs
      args:
      - op: ts_corr
        args:
        - ref: vwap
        - ref: adv20
        - value: 6
- name: t5
  expr:
    op: mul
    args:
    - value: 0.6
    - op: rank
      args:
      - op: mul
        args:
        - op: sub
          args:
          - op: div
            args:
            - op: ts_sum
              args:
              - ref: close
              - value: 200
            - value: 200.0
          - ref: open_
        - op: sub
          args:
          - ref: close
          - ref: open_
- name: out
  expr:
    op: add
    args:
    - op: add
      args:
      - op: add
        args:
        - op: add
          args:
          - ref: t1
          - ref: t2
        - ref: t3
      - ref: t4
    - ref: t5
final:
  ref: out
