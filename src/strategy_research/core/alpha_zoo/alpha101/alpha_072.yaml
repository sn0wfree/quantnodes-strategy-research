id: alpha101_072
zoo: alpha101
nickname: 'Kakushadze Alpha #72'
theme:
- volume
formula_latex: rank(decay_linear(correlation((high+low)/2, adv40, 9), 10)) / rank(decay_linear(correlation(Ts_Rank(vwap,4),
  Ts_Rank(volume,19), 7), 3))
columns_required:
- high
- low
- volume
- vwap
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 57
steps:
- name: high
  expr:
    column: high
- name: low
  expr:
    column: low
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: adv40
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 40
- name: num
  expr:
    op: rank
    args:
    - op: decay_linear
      args:
      - op: ts_corr
        args:
        - op: div
          args:
          - op: add
            args:
            - ref: high
            - ref: low
          - value: 2.0
        - ref: adv40
        - value: 9
      - value: 10
- name: denom
  expr:
    op: rank
    args:
    - op: decay_linear
      args:
      - op: ts_corr
        args:
        - op: ts_rank
          args:
          - ref: vwap
          - value: 4
        - op: ts_rank
          args:
          - ref: volume
          - value: 19
        - value: 7
      - value: 3
- name: out
  expr:
    op: safe_div
    args:
    - ref: num
    - ref: denom
final:
  ref: out
