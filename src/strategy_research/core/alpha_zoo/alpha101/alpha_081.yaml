id: alpha101_081
zoo: alpha101
nickname: 'Kakushadze Alpha #81'
theme:
- volume
formula_latex: (rank(Log(product(rank((rank(correlation(vwap, sum(adv10,50), 8))^4)), 15))) < rank(correlation(rank(vwap),
  rank(volume), 5))) * -1
columns_required:
- volume
- vwap
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 70
steps:
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: adv10
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 10
- name: inner
  expr:
    op: rank
    args:
    - op: ts_corr
      args:
      - ref: vwap
      - op: ts_sum
        args:
        - ref: adv10
        - value: 50
      - value: 8
- name: inner_2
  expr:
    op: signed_power
    args:
    - ref: inner
    - value: 4.0
- name: inner_3
  expr:
    op: rank
    args:
    - ref: inner_2
- name: prod
  expr:
    op: ts_prod
    args:
    - ref: inner
    - value: 15
- name: lhs
  expr:
    op: rank
    args:
    - op: log
      args:
      - op: where
        args:
        - ref: prod
        - op: gt
          args:
          - ref: prod
          - value: 0
- name: rhs
  expr:
    op: rank
    args:
    - op: ts_corr
      args:
      - op: rank
        args:
        - ref: vwap
      - op: rank
        args:
        - ref: volume
      - value: 5
- name: out
  expr:
    op: mul
    args:
    - op: astype
      args:
      - op: lt
        args:
        - ref: lhs
        - ref: rhs
      - value: float
    - op: neg
      args:
      - value: 1.0
final:
  ref: out
