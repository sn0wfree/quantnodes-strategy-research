id: alpha101_082
zoo: alpha101
nickname: 'Kakushadze Alpha #82'
theme:
- volume
formula_latex: min(rank(decay_linear(delta(open,1),15)), Ts_Rank(decay_linear(correlation(IndNeutralize(volume, sector), 0.634*open+0.366*open,
  17), 7), 13)) * -1
columns_required:
- open
- volume
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 35
steps:
- name: close
  expr:
    column: close
- name: open_
  expr:
    column: open
- name: volume
  expr:
    column: volume
- name: ind_neutralize
  expr:
    ref: _ind_neutralize
- name: a
  expr:
    op: rank
    args:
    - op: decay_linear
      args:
      - op: delta
        args:
        - ref: open_
        - value: 1
      - value: 15
- name: mix
  expr:
    op: add
    args:
    - op: mul
      args:
      - ref: open_
      - value: 0.634196
    - op: mul
      args:
      - ref: open_
      - op: sub
        args:
        - value: 1.0
        - value: 0.634196
- name: b
  expr:
    op: ts_rank
    args:
    - op: decay_linear
      args:
      - op: ts_corr
        args:
        - op: ind_neutralize
          args:
          - ref: volume
          - ref: panel
        - ref: mix
        - value: 17
      - value: 7
    - value: 13
- name: arr_a
  expr:
    op: to_numpy
    args:
    - ref: a
- name: arr_b
  expr:
    op: to_numpy
    args:
    - ref: b
- name: out
  expr:
    op: mul
    args:
    - op: DataFrame
      args:
      - ref: pd
      - op: fmin
        args:
        - ref: arr_a
        - ref: arr_b
    - op: neg
      args:
      - value: 1.0
final:
  ref: out
