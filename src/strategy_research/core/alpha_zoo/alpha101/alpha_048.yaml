id: alpha101_048
zoo: alpha101
nickname: 'Kakushadze Alpha #48'
theme:
- momentum
- volatility
formula_latex: indneutralize(...subindustry...) / sum((delta(close,1)/delay(close,1))^2, 250)
columns_required:
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 251
steps:
- name: close
  expr:
    column: close
- name: num
  expr:
    op: div
    args:
    - op: mul
      args:
      - op: ts_corr
        args:
        - op: delta
          args:
          - ref: close
          - value: 1
        - op: delta
          args:
          - op: delay
            args:
            - ref: close
            - value: 1
          - value: 1
        - value: 250
      - op: delta
        args:
        - ref: close
        - value: 1
    - ref: close
- name: num_2
  expr:
    ref: num
- name: denom
  expr:
    op: ts_sum
    args:
    - op: pow
      args:
      - op: safe_div
        args:
        - op: delta
          args:
          - ref: close
          - value: 1
        - op: delay
          args:
          - ref: close
          - value: 1
      - value: 2
    - value: 250
- name: out
  expr:
    op: safe_div
    args:
    - ref: num
    - ref: denom
final:
  ref: out
