id: alpha101_003
zoo: alpha101
nickname: 'Kakushadze Alpha #3'
theme:
- volume
- reversal
formula_latex: -1 * correlation(rank(open), rank(volume), 10)
columns_required:
- open
- volume
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 10
steps:
- name: open_
  expr:
    column: open
- name: volume
  expr:
    column: volume
- name: out
  expr:
    op: mul
    args:
    - op: neg
      args:
      - value: 1.0
    - op: ts_corr
      args:
      - op: rank
        args:
        - ref: open_
      - op: rank
        args:
        - ref: volume
      - value: 10
final:
  ref: out
