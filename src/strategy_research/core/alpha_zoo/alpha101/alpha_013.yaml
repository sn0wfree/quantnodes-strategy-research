id: alpha101_013
zoo: alpha101
nickname: 'Kakushadze Alpha #13'
theme:
- volume
formula_latex: -1 * rank(covariance(rank(close), rank(volume), 5))
columns_required:
- close
- volume
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 5
steps:
- name: close
  expr:
    column: close
- name: volume
  expr:
    column: volume
- name: out
  expr:
    op: mul
    args:
    - op: neg
      args:
      - value: 1.0
    - op: rank
      args:
      - op: ts_cov
        args:
        - op: rank
          args:
          - ref: close
        - op: rank
          args:
          - ref: volume
        - value: 5
final:
  ref: out
