id: alpha101_014
zoo: alpha101
nickname: 'Kakushadze Alpha #14'
theme:
- volume
- momentum
formula_latex: (-1*rank(delta(returns,3))) * correlation(open, volume, 10)
columns_required:
- open
- close
- volume
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 10
steps:
- name: close
  expr:
    column: close
- name: open_
  expr:
    column: open
- name: volume
  expr:
    column: volume
- name: returns
  expr:
    op: pct_change
    args:
    - ref: close
- name: out
  expr:
    op: mul
    args:
    - op: mul
      args:
      - op: neg
        args:
        - value: 1.0
      - op: rank
        args:
        - op: delta
          args:
          - ref: returns
          - value: 3
    - op: ts_corr
      args:
      - ref: open_
      - ref: volume
      - value: 10
final:
  ref: out
