id: alpha101_074
zoo: alpha101
nickname: 'Kakushadze Alpha #74'
theme:
- volume
formula_latex: (rank(correlation(close, sum(adv30,37), 15)) < rank(correlation(rank(0.026*high+0.974*vwap), rank(volume),
  11))) * -1
columns_required:
- high
- close
- volume
- vwap
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 60
steps:
- name: close
  expr:
    column: close
- name: high
  expr:
    column: high
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: adv30
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 30
- name: rolling_sum
  expr:
    op: ts_sum
- name: lhs
  expr:
    op: rank
    args:
    - op: ts_corr
      args:
      - ref: close
      - op: rolling_sum
        args:
        - ref: adv30
        - value: 37
      - value: 15
- name: mix
  expr:
    op: add
    args:
    - op: mul
      args:
      - ref: high
      - value: 0.0261661
    - op: mul
      args:
      - ref: vwap
      - op: sub
        args:
        - value: 1.0
        - value: 0.0261661
- name: rhs
  expr:
    op: rank
    args:
    - op: ts_corr
      args:
      - op: rank
        args:
        - ref: mix
      - op: rank
        args:
        - ref: volume
      - value: 11
- name: out
  expr:
    op: mul
    args:
    - op: astype
      args:
      - op: lt
        args:
        - ref: lhs
        - ref: rhs
      - ref: float
    - op: neg
      args:
      - value: 1.0
final:
  ref: out
