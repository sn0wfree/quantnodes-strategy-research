id: alpha101_064
zoo: alpha101
nickname: 'Kakushadze Alpha #64'
theme:
- volume
formula_latex: (rank(correlation(sum(0.178*open+0.822*low,13), sum(adv120,13), 17)) < rank(delta(0.178*((high+low)/2)+0.822*vwap,
  4))) * -1
columns_required:
- open
- high
- low
- volume
- vwap
- close
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 136
steps:
- name: open_
  expr:
    column: open
- name: high
  expr:
    column: high
- name: low
  expr:
    column: low
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: adv120
  expr:
    op: ts_mean
    args:
    - ref: volume
    - value: 120
- name: rolling_sum
  expr:
    op: ts_sum
- name: a
  expr:
    op: add
    args:
    - op: mul
      args:
      - ref: open_
      - value: 0.178404
    - op: mul
      args:
      - ref: low
      - op: sub
        args:
        - value: 1.0
        - value: 0.178404
- name: b
  expr:
    op: add
    args:
    - op: mul
      args:
      - op: div
        args:
        - op: add
          args:
          - ref: high
          - ref: low
        - value: 2.0
      - value: 0.178404
    - op: mul
      args:
      - ref: vwap
      - op: sub
        args:
        - value: 1.0
        - value: 0.178404
- name: lhs
  expr:
    op: rank
    args:
    - op: ts_corr
      args:
      - op: rolling_sum
        args:
        - ref: a
        - value: 13
      - op: rolling_sum
        args:
        - ref: adv120
        - value: 13
      - value: 17
- name: rhs
  expr:
    op: rank
    args:
    - op: delta
      args:
      - ref: b
      - value: 4
- name: out
  expr:
    op: mul
    args:
    - op: astype
      args:
      - op: lt
        args:
        - ref: lhs
        - ref: rhs
      - ref: float
    - op: neg
      args:
      - value: 1.0
final:
  ref: out
