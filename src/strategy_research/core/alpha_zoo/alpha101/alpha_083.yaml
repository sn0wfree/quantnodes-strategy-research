id: alpha101_083
zoo: alpha101
nickname: 'Kakushadze Alpha #83'
theme:
- volume
- volatility
formula_latex: (rank(delay((high-low)/(sum(close,5)/5), 2)) * rank(rank(volume))) / (((high-low)/(sum(close,5)/5)) / (vwap-close))
columns_required:
- high
- low
- close
- volume
- vwap
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 7
steps:
- name: close
  expr:
    column: close
- name: high
  expr:
    column: high
- name: low
  expr:
    column: low
- name: volume
  expr:
    column: volume
- name: vwap
  expr:
    column: vwap
- name: rng_avg
  expr:
    op: safe_div
    args:
    - op: sub
      args:
      - ref: high
      - ref: low
    - op: div
      args:
      - op: ts_sum
        args:
        - ref: close
        - value: 5
      - value: 5.0
- name: num
  expr:
    op: mul
    args:
    - op: rank
      args:
      - op: delay
        args:
        - ref: rng_avg
        - value: 2
    - op: rank
      args:
      - op: rank
        args:
        - ref: volume
- name: denom
  expr:
    op: safe_div
    args:
    - ref: rng_avg
    - op: sub
      args:
      - ref: vwap
      - ref: close
- name: out
  expr:
    op: safe_div
    args:
    - ref: num
    - ref: denom
final:
  ref: out
