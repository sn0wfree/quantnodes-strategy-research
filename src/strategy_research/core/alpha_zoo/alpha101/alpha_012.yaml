id: alpha101_012
zoo: alpha101
nickname: 'Kakushadze Alpha #12'
theme:
- volume
- reversal
formula_latex: sign(delta(volume,1)) * (-1 * delta(close,1))
columns_required:
- close
- volume
universe:
- equity_us
- equity_in
frequency:
- 1D
decay_horizon: 5
min_warmup_bars: 2
steps:
- name: close
  expr:
    column: close
- name: volume
  expr:
    column: volume
- name: out
  expr:
    op: mul
    args:
    - op: sign
      args:
      - op: delta
        args:
        - ref: volume
        - value: 1
    - op: mul
      args:
      - op: neg
        args:
        - value: 1.0
      - op: delta
        args:
        - ref: close
        - value: 1
final:
  ref: out
